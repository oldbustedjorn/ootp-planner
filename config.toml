[paths]
online_data_dir = "E:/Out of the Park Developments/OOTP Baseball 27/data/online_data"
hitters_csv = "E:/Out of the Park Developments/OOTP Baseball 27/data/online_data/collection_-_manage_cards_collection_-_manage_cards_gpt_batters.csv"
pitchers_csv = "E:/Out of the Park Developments/OOTP Baseball 27/data/online_data/collection_-_manage_cards_collection_-_manage_cards_gpt_pitchers.csv"
output_dir = "outputs"

[defaults]
profile = "both"

[hitters]
defense_scale = 0.70
vs_rhp_weight = 0.70
vs_lhp_weight = 0.30
min_pos_rating = 1.0

# batting weights
contact = 0.00
power = 1.10
eye = 1.00
gap_power = 0.50
babip = 1.25
avoid_k = 0.85

# pinch-running weights
pr_speed = 1.00
pr_baserunning = 0.80
pr_stealing_ability = 0.70
pr_stealing_aggressiveness = 0.40

# defensive component weights
fld_pos = 1.00
c_framing = 1.20
c_blocking = 0.90
c_arm = 0.70
if_range = 1.10
if_error = 0.60
if_arm = 0.70
turn_dp = 0.60
of_range = 1.10
of_error = 0.55
of_arm = 0.65

# position blends: offense, defense
[position_blends]
C = [0.90, 1.10]
SS = [0.92, 1.05]
CF = [0.93, 1.03]
2B = [0.94, 1.00]
3B = [0.95, 0.98]
RF = [0.96, 0.95]
LF = [0.97, 0.92]
1B = [0.98, 0.80]

[pitchers]
vs_rhb_weight = 0.70
vs_lhb_weight = 0.30

# starter gating / role settings
stamina = 0.00
pitch_count = 8.0
pitch_threshold = 60.0
starter_min_stamina = 60
starter_min_good_pitches = 3
starter_stamina_gate_penalty = 1000000
starter_pitch_gate_penalty = 250000

# starter weights
sp_stuff = 1.00
sp_pbabip = 1.30
sp_hr_rate = 1.20
sp_control = 0.80
sp_movement = 0.00

# reliever weights
rp_stuff = 1.30
rp_pbabip = 1.10
rp_hr_rate = 1.00
rp_control = 0.80
rp_movement = 0.00

[roster]
default_profile = "standard_pt"

[roster_profiles.standard_pt]
mode = "standard_pt"
hitter_count = 13
pitcher_count = 13
dh_enabled = true
platoons_allowed = false

lineup_fill_order = ["C", "SS", "CF", "2B", "3B", "LF", "RF", "1B", "DH"]

rotation_size = 5
primary_rp_count = 6
specialist_lhp_count = 1
long_man_count = 1

# v1 bench-building approach:
# 1 backup C
# 1 backup IF
# 1 backup OF
# 1 utility / gap-filler
bench_roles = ["C", "IF", "OF", "UTIL"]

[roster_profiles.standard_pt.min_defense_by_position]
C = 80
1B = 40
2B = 60
3B = 60
SS = 85
LF = 65
CF = 85
RF = 65

[roster_profiles.standard_pt.bench_role_requirements.C]
required_positions = ["C"]

[roster_profiles.standard_pt.bench_role_requirements.IF]
required_positions = ["SS", "2B"]
preferred_positions = ["SS", "2B", "3B", "1B"]

[roster_profiles.standard_pt.bench_role_requirements.OF]
required_positions = ["CF","LF","RF"]
preferred_positions = ["CF", "LF", "RF"]

[roster_profiles.standard_pt.bench_role_requirements.UTIL]
required_positions_any = ["C", "1B", "2B", "3B", "SS", "LF", "CF", "RF"]
preferred_positions = ["C", "SS", "CF", "2B", "3B", "LF", "RF", "1B"]